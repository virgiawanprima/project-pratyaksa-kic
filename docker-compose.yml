version: "3.9"

networks:
  pratyaksa-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  grafana_data:
  prometheus_data:

services:
  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pratyaksa-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    networks:
      - pratyaksa-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # AUDIT H6: resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped

  # ── PostgreSQL + TimescaleDB ─────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: pratyaksa-postgres
    environment:
      POSTGRES_DB: pratyaksa
      POSTGRES_USER: pratyaksa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - pratyaksa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pratyaksa -d pratyaksa"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped

  # ── FastAPI Inference API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker-container/api/Dockerfile
    container_name: pratyaksa-api
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pratyaksa:${POSTGRES_PASSWORD}@postgres:5432/pratyaksa
      PRATYAKSA_API_KEYS: ${PRATYAKSA_API_KEYS}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./schema_config.json:/app/schema_config.json:ro
    ports:
      - "6000:6000"
    networks:
      - pratyaksa-net
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    # AUDIT H6: healthcheck + resource limits
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped

  # ── MLflow ───────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    container_name: pratyaksa-mlflow
    command: >
      sh -c "pip install psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://pratyaksa:${POSTGRES_PASSWORD}@postgres:5432/pratyaksa
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    volumes:
      - mlflow_data:/mlflow/artifacts
    ports:
      - "6050:5000"
    networks:
      - pratyaksa-net
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pratyaksa-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "6090:9090"
    networks:
      - pratyaksa-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: pratyaksa-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-pratyaksa2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "6001:3000"
    networks:
      - pratyaksa-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped

  # ── Simulator (Dev Only) ─────────────────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: docker-container/simulator/Dockerfile
    container_name: pratyaksa-simulator
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./data:/app/data:ro
    networks:
      - pratyaksa-net
    depends_on:
      redis: { condition: service_healthy }
    profiles: [dev]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker-container/airflow/Dockerfile
    container_name: pratyaksa-airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/pratyaksa
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./artifacts:/opt/airflow/artifacts
      # AUDIT F5: mount untuk data/daily
      - ./data/daily:/opt/airflow/data/daily
      - ./data:/opt/airflow/data
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - pratyaksa-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    restart: unless-stopped

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: docker-container/airflow/Dockerfile
    container_name: pratyaksa-airflow-web
    command: webserver
    ports:
      - "6080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/pratyaksa
    depends_on:
      airflow-scheduler: { condition: service_started }
    networks:
      - pratyaksa-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ── MQTT Broker (Mosquitto) ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "6883:1883"   # MQTT
      - "6884:9001"   # WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - pratyaksa-net
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped

  # ── MQTT→Redis Bridge ────────────────────────────────────────────────────────
  bridge:
    build:
      context: .
      dockerfile: docker-container/bridge/Dockerfile
    depends_on:
      - mosquitto
      - redis
    networks:
      - pratyaksa-net
    restart: unless-stopped